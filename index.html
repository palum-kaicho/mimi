<!-- HEADER DEVICE (ファンマークコピー機能付き) -->
    <header class="profile-header" style="padding: 0; overflow: hidden; border: none; background: none; box-shadow: none;">
        <!-- 絶対配置でコピーボタンを重ねるためのコンテナ -->
        <div style="position: relative; width: 100%; height: auto; margin: 0; padding: 0;">
            
            <!-- 新しい最強のヘッダー画像を表示や！ -->
            <img class="avatar" src="images/top.png" alt="ᎷᏐᩚᎷᏐᩚ Official Header" style="width: 100%; height: auto; border-radius: 24px; border: 1px solid var(--border-accent); display: block;">
            
            <!-- 📋 COPYボタンの上に透明なタップ領域をピッタリ配置（クリックでJSを実行） -->
            <button onclick="copyFanMark()" style="position: absolute; left: 63%; top: 62.5%; width: 26%; height: 6.5%; background: none; border: none; border-radius: 30px; cursor: pointer; z-index: 20; outline: none;" title="ファンマークをコピー"></button>
            
        </div>
    </header>

    <!-- 💡 コピー成功時にふわっと出るトースト通知（ネオンピンク仕様） -->
    <div id="copy-toast" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(255, 0, 102, 0.9); color: #fff; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; box-shadow: 0 0 15px rgba(255, 0, 102, 0.6); z-index: 9999; opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; border: 1px solid #ff66aa;">
        💘 ファンマークをコピーしたよ！ (ᰔᩚ³³)
    </div>

    <!-- ⚡ ファンマークコピー用JavaScript -->
    <script>
    function copyFanMark() {
        // 例の量産型・地雷系最強ハートファンマークの文字列
        const fanMark = "ᰔᩚ³³";
        
        // クリップボードに書き込み
        navigator.clipboard.writeText(fanMark).then(() => {
            const toast = document.getElementById('copy-toast');
            
            // トースト通知をふわっと出現させる
            toast.style.opacity = "1";
            toast.style.transform = "translateX(-50%) translateY(0)";
            
            // 2秒後に自動で隠す
            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transform = "translateX(-50%) translateY(100px)";
            }, 2000);
        }).catch(err => {
            console.error('コピー失敗や...: ', err);
        });
    }
    </script>
